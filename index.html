<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Have a Question...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #d63031;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #4d4d4d;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .gif-container img {
            max-width: 150px;
            margin-bottom: 20px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            height: 60px;
            align-items: center;
            position: relative;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        #yesBtn {
            background-color: #2ecc71;
            color: white;
        }

        #yesBtn:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container">
            <!-- A cute placeholder GIF, you can swap this URL with any cute gif you like! -->
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3BwNWhnd3Z0b3R6M3A2d3Y4cm9pZ3p4bDNtem9xbXRxZ3B5d3Z6ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute bear">
        </div>
        
        <h1 id="question">Will you marry me? 💍</h1>
        <p id="subtext">Think carefully...</p>

        <div class="btn-container">
            <button id="yesBtn" onclick="celebrate()">Yes!</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const subtext = document.getElementById('subtext');

        // Function that teleports the "No" button when hovered or clicked
        function moveButton() {
            // Get screen dimensions safely considering padding
            const padding = 100;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            // Generate random coordinates
            // Ensures it doesn't just stay in the center container
            const randomX = Math.floor(Math.random() * (maxX + padding)) - (padding / 2);
            const randomY = Math.floor(Math.random() * (maxY + padding)) - (padding / 2);

            // Apply new positions
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // What happens when she finally clicks "Yes!"
        function celebrate() {
            question.innerText = "YAYYYYY! 🥰❤️🎉";
            subtext.innerText = "I knew you'd say yes! (Not like you had a choice...)";
            
            // Hide the elusive "No" button entirely
            noBtn.style.display = 'none';
            
            // Make the Yes button extra happy
            yesBtn.style.transform = 'scale(1.4)';
            yesBtn.disabled = true;
            yesBtn.innerText = "Forever! 💕";

            // Optional: You can change the background color or trigger full page confetti here!
            document.body.style.background = "linear-gradient(135deg, #ff9999, #ff4d4d)";
        }
    </script>
