<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Very Special Question for Anisa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative; /* Crucial for absolute button movement */
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 600px; /* Adjusted for image width */
            width: 90%;
            border: 5px solid #d63031;
        }

        h1 {
            color: #333;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        p.subtext {
            color: #d63031;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .photo-container {
            width: 100%;
            height: auto;
            max-height: 400px;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 3px solid #ff4d4d;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .btn-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 30px;
            position: relative; /* For button boundary */
            height: 80px; /* Define space for movement */
            width: 100%;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        #yesBtn {
            background-color: #2ecc71; /* Green */
            color: white;
        }

        #yesBtn:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        /* The Elusive dancing button */
        #noBtn {
            background-color: #e74c3c; /* Red */
            color: white;
            transition: left 0.15s ease, top 0.15s ease, opacity 0.1s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Anisa, will you marry me bandi?</h1>
        <p class="subtext">Thinking carefully...</p>

        <div class="photo-container">
            <img src="ourphoto.jpg" alt="Anisa and Me">
        </div>

        <div class="btn-container" id="btnWrapper">
            <button id="yesBtn" onclick="celebrate()">YES! 🥰</button>
            <button id="noBtn" onmouseover="dance(this)">NO 🙅‍♀️</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const container = document.querySelector('.container');

        // Function that teleports the button when hovered
        function dance(button) {
            // Get screen and container dimensions securely
            const maxX = window.innerWidth - button.offsetWidth - 20;
            const maxY = window.innerHeight - button.offsetHeight - 20;

            // Generate random coordinates within safety limits
            // This ensures it doesn't just stay in the center container boundary
            const randomX = Math.floor(Math.random() * (maxX + 10)) - 10;
            const randomY = Math.floor(Math.random() * (maxY + 10)) - 10;

            // Apply new position globally on screen
            button.style.position = 'fixed'; // Required for global movement
            button.style.left = randomX + 'px';
            button.style.top = randomY + 'px';
            button.style.zIndex = '9999'; // Stay on top
        }

        function celebrate() {
            // Update the interface for YES
            document.querySelector('h1').innerText = "FOREVER! YAY! 🥰❤️🎉";
            document.querySelector('.subtext').innerText = "Anisa, I knew you'd make me the luckiest man!";
            
            // Hide the elusive button and wrapper
            noBtn.style.display = 'none';
            document.getElementById('btnWrapper').style.justifyContent = 'center';
            
            // Make YES button extra happy
            const yes = document.getElementById('yesBtn');
            yes.innerText = "WE'RE ENGAGED! 💕💍";
            yes.style.transform = 'scale(1.3)';
            yes.disabled = true;

            // Trigger full-page effect (like changing gradient)
            document.body.style.background = "linear-gradient(135deg, #ff9999, #ff4d4d)";
        }
    </script>
</body>
